services:
  scraper:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: get_config_flask
    restart: always
    ports:
      - "5000:5000"
    # env_file:
    #   - stack.env
    environment:
      - BASE_PATH=/app/nas_data/
    networks:
      - n8n
    volumes:
      - NAS:/app/nas_data/
      # - C:\Users\lscm-\Desktop\test_volume\nas_data:/app/nas_data

volumes:
  NAS:
    external: true

networks:
  n8n:
    external: true
